<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Nuclear Arsenal Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0c10;
  --bg-panel: rgba(10, 14, 22, 0.92);
  --border: rgba(56, 189, 248, 0.15);
  --accent: #38bdf8;
  --accent-dim: rgba(56, 189, 248, 0.3);
  --danger: #ef4444;
  --danger-dim: rgba(239, 68, 68, 0.3);
  --warning: #f59e0b;
  --text-primary: #e2e8f0;
  --text-dim: #64748b;
  --text-bright: #f8fafc;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Chakra Petch', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 1;
}

canvas { display: block; }

/* Scanline overlay */
#canvas-container::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 2;
}

/* Header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: linear-gradient(180deg, rgba(10,12,16,0.95) 0%, transparent 100%);
  pointer-events: none;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border: 2px solid var(--danger);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: pulse-ring 3s ease-in-out infinite;
}

@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 0 0 var(--danger-dim); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

.logo-icon::after {
  content: '☢';
  font-size: 18px;
  color: var(--danger);
}

.header h1 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-bright);
}

.header h1 span {
  color: var(--danger);
}

.header-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
}

.live-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--danger);
  border-radius: 50%;
  margin-right: 6px;
  animation: blink 1.5s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* Side Panel */
.side-panel {
  position: fixed;
  top: 80px;
  left: 16px;
  bottom: 16px;
  width: 300px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  pointer-events: auto;
  scrollbar-width: none;
}

.side-panel::-webkit-scrollbar { display: none; }

.panel-card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  backdrop-filter: blur(20px);
}

.panel-card h3 {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-card h3::before {
  content: '';
  width: 8px;
  height: 2px;
  background: var(--accent);
}

/* Stats */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat-item {
  padding: 10px;
  background: rgba(56, 189, 248, 0.04);
  border-radius: 6px;
  border: 1px solid rgba(56, 189, 248, 0.08);
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text-bright);
}

.stat-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Country list */
.country-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.country-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}

.country-item:hover {
  background: rgba(56, 189, 248, 0.06);
  border-color: var(--border);
}

.country-item.active {
  background: rgba(56, 189, 248, 0.1);
  border-color: var(--accent);
}

.country-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.country-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.country-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-primary);
}

.country-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
}

/* Detail panel */
.detail-panel {
  position: fixed;
  top: 80px;
  right: 16px;
  width: 320px;
  z-index: 10;
  pointer-events: auto;
  transform: translateX(340px);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.detail-panel.open {
  transform: translateX(0);
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.detail-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-bright);
}

.detail-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.detail-close:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(56, 189, 248, 0.06);
}

.detail-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.detail-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-bright);
}

.detail-range {
  margin-top: 12px;
  padding: 12px;
  background: rgba(239, 68, 68, 0.06);
  border: 1px solid rgba(239, 68, 68, 0.15);
  border-radius: 6px;
}

.detail-range-title {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--danger);
  margin-bottom: 8px;
}

.range-bar-bg {
  height: 4px;
  background: rgba(239, 68, 68, 0.15);
  border-radius: 2px;
  overflow: hidden;
}

.range-bar-fill {
  height: 100%;
  background: var(--danger);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.range-km {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--danger);
  margin-top: 6px;
}

/* Controls hint */
.controls-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  background: var(--bg-panel);
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
}

/* Filter buttons */
.filter-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.filter-btn.active {
  background: rgba(56, 189, 248, 0.12);
  border-color: var(--accent);
  color: var(--accent);
}

/* Tooltip */
.tooltip {
  position: fixed;
  z-index: 100;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  backdrop-filter: blur(20px);
  font-size: 12px;
  white-space: nowrap;
}

.tooltip.visible { opacity: 1; }

.tooltip-name {
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 2px;
}

.tooltip-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

@media (max-width: 768px) {
  .side-panel { display: none; }
  .detail-panel { width: 280px; right: 8px; }
}
</style>
</head>

  { name: "Punggye-ri Test Site", country: "North Korea", lat: 41.28, lng: 129.09, type: "test", missiles: "Nuclear Test Tunnels", warheads: 0, range: 0, status: "Collapsed/Standby" }
];

const TYPE_LABELS = {
  icbm: 'ICBM / Missile Silo',
  submarine: 'Submarine Base',
  airbase: 'Nuclear Air Base',
  storage: 'Storage / Production',
  test: 'Test Site'
};

// ── THREE.JS SCENE ──
let scene, camera, renderer, globe, points = [], raycaster, mouse;
let isDragging = false, prevMouse = { x: 0, y: 0 };
let rotationVelocity = { x: 0, y: 0 };
let targetRotation = { x: 0.3, y: 0 };
let autoRotate = true;
let selectedFacility = null;
let activeFilter = 'all';
let activeCountry = null;

const container = document.getElementById('canvas-container');

function init() {
  scene = new THREE.Scene();
  
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 3.2;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0c10, 1);
  container.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 0.04 };
  mouse = new THREE.Vector2();

  createStarfield();
  createGlobe();
  createFacilityPoints();
  createAtmosphere();
  
  setupLights();
  setupEvents();
  buildCountryList();
  setupFilters();
  
  animate();
}

function createStarfield() {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(3000 * 3);
  for (let i = 0; i < 3000; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 100;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0x334155, size: 0.08, sizeAttenuation: true });
  scene.add(new THREE.Points(geo, mat));
}

function createGlobe() {
  // Main sphere — dark surface
  const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
  const sphereMat = new THREE.MeshPhongMaterial({
    color: 0x0c1220,
    emissive: 0x050a14,
    specular: 0x1e3a5f,
    shininess: 15,
    transparent: true,
    opacity: 0.95
  });
  globe = new THREE.Mesh(sphereGeo, sphereMat);
  scene.add(globe);

  // Wireframe grid overlay
  const wireGeo = new THREE.SphereGeometry(1.002, 36, 18);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x1e3a5f,
    wireframe: true,
    transparent: true,
    opacity: 0.08
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  globe.add(wire);

  // Equator ring
  const ringGeo = new THREE.RingGeometry(1.003, 1.007, 128);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x38bdf8,
    transparent: true,
    opacity: 0.1,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  globe.add(ring);
}

function latLngToVector3(lat, lng, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function createFacilityPoints() {
  facilities.forEach((f, i) => {
    const pos = latLngToVector3(f.lat, f.lng, 1.01);
    const color = new THREE.Color(COUNTRY_COLORS[f.country] || '#ffffff');

    // Outer glow ring
    const ringGeo = new THREE.RingGeometry(0.012, 0.022, 16);
    const ringMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(pos.clone().multiplyScalar(2));
    ring.userData = { facilityIndex: i };
    globe.add(ring);

    // Inner dot
    const dotGeo = new THREE.CircleGeometry(0.009, 12);
    const dotMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.9,
      side: THREE.DoubleSide
    });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(pos);
    dot.lookAt(pos.clone().multiplyScalar(2));
    dot.userData = { facilityIndex: i };
    globe.add(dot);

    // Pulse animation ring
    const pulseGeo = new THREE.RingGeometry(0.009, 0.011, 16);
    const pulseMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.5,
      side: THREE.DoubleSide
    });
    const pulse = new THREE.Mesh(pulseGeo, pulseMat);
    pulse.position.copy(pos);
    pulse.lookAt(pos.clone().multiplyScalar(2));
    pulse.userData = { facilityIndex: i, isPulse: true, baseScale: 1 };
    globe.add(pulse);

    points.push({ ring, dot, pulse, facility: f });
  });
}

function createAtmosphere() {
  const atmosGeo = new THREE.SphereGeometry(1.05, 64, 64);
  const atmosMat = new THREE.ShaderMaterial({
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.6 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
        gl_FragColor = vec4(0.22, 0.74, 0.97, 0.15) * intensity;
      }
    `,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true
  });
  scene.add(new THREE.Mesh(atmosGeo, atmosMat));
}

function setupLights() {
  scene.add(new THREE.AmbientLight(0x334155, 0.6));
  const dirLight = new THREE.DirectionalLight(0x94a3b8, 0.8);
  dirLight.position.set(5, 3, 5);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0x38bdf8, 0.3);
  rimLight.position.set(-5, -2, -3);
  scene.add(rimLight);
}

// ── INTERACTION ──
function setupEvents() {
  const canvas = renderer.domElement;

  canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    autoRotate = false;
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  canvas.addEventListener('mousemove', (e) => {
    // Tooltip on hover
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    if (isDragging) {
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;
      rotationVelocity.x = dy * 0.003;
      rotationVelocity.y = dx * 0.003;
      targetRotation.x += rotationVelocity.x;
      targetRotation.y += rotationVelocity.y;
      prevMouse = { x: e.clientX, y: e.clientY };
    }
    
    checkHover(e);
  });

  canvas.addEventListener('mouseup', () => {
    isDragging = false;
    setTimeout(() => { autoRotate = true; }, 3000);
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    camera.position.z = Math.max(1.8, Math.min(6, camera.position.z + e.deltaY * 0.002));
  }, { passive: false });

  canvas.addEventListener('click', (e) => {
    checkClick(e);
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('open');
    selectedFacility = null;
    clearRangeRing();
  });
}

let hoveredFacility = null;

function checkHover(e) {
  raycaster.setFromCamera(mouse, camera);
  const meshes = points.flatMap(p => [p.ring, p.dot]);
  const intersects = raycaster.intersectObjects(meshes);
  
  const tooltip = document.getElementById('tooltip');
  
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.facilityIndex;
    if (idx !== undefined) {
      const f = facilities[idx];
      if (isVisible(f)) {
        hoveredFacility = idx;
        document.getElementById('tooltip-name').textContent = f.name;
        document.getElementById('tooltip-type').textContent = `${f.country} · ${TYPE_LABELS[f.type]}`;
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        tooltip.classList.add('visible');
        renderer.domElement.style.cursor = 'pointer';
        return;
      }
    }
  }
  
  hoveredFacility = null;
  tooltip.classList.remove('visible');
  renderer.domElement.style.cursor = 'grab';
}

function checkClick(e) {
  raycaster.setFromCamera(mouse, camera);
  const meshes = points.flatMap(p => [p.ring, p.dot]);
  const intersects = raycaster.intersectObjects(meshes);
  
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.facilityIndex;
    if (idx !== undefined) {
      const f = facilities[idx];
      if (isVisible(f)) {
        showDetail(f);
      }
    }
  }
}

function isVisible(f) {
  if (activeFilter !== 'all' && f.type !== activeFilter) return false;
  if (activeCountry && f.country !== activeCountry) return false;
  return true;
}

function showDetail(f) {
  selectedFacility = f;
  document.getElementById('detail-title').textContent = f.name;
  
  const maxRange = 18000;
  const rangePct = f.range ? Math.min((f.range / maxRange) * 100, 100) : 0;
  
  let html = `
    <div class="detail-row"><span class="detail-label">Country</span><span class="detail-value">${f.country}</span></div>
    <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${TYPE_LABELS[f.type]}</span></div>
    <div class="detail-row"><span class="detail-label">System</span><span class="detail-value">${f.missiles}</span></div>
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${f.status}</span></div>
    ${f.warheads ? `<div class="detail-row"><span class="detail-label">Est. Warheads</span><span class="detail-value" style="color:var(--danger)">${f.warheads.toLocaleString()}</span></div>` : ''}
  `;
  
  if (f.range > 0) {
    html += `
      <div class="detail-range">
        <div class="detail-range-title">Maximum Range</div>
        <div class="range-bar-bg"><div class="range-bar-fill" style="width:${rangePct}%"></div></div>
        <div class="range-km">${f.range.toLocaleString()} km</div>
      </div>
    `;
  }
  
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-panel').classList.add('open');
  
  // Draw range ring on globe
  if (f.range > 0) {
    drawRangeRing(f);
  } else {
    clearRangeRing();
  }
}

let rangeRingMesh = null;
function drawRangeRing(f) {
  clearRangeRing();
  const angularRadius = f.range / 6371;
  const center = latLngToVector3(f.lat, f.lng, 1.015);
  
  const ringPoints = [];
  const segments = 64;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const lat2 = Math.asin(
      Math.sin(f.lat * Math.PI / 180) * Math.cos(angularRadius) +
      Math.cos(f.lat * Math.PI / 180) * Math.sin(angularRadius) * Math.cos(angle)
    );
    const lng2 = f.lng * Math.PI / 180 + Math.atan2(
      Math.sin(angle) * Math.sin(angularRadius) * Math.cos(f.lat * Math.PI / 180),
      Math.cos(angularRadius) - Math.sin(f.lat * Math.PI / 180) * Math.sin(lat2)
    );
    const pt = latLngToVector3(lat2 * 180 / Math.PI, lng2 * 180 / Math.PI, 1.012);
    ringPoints.push(pt);
  }
  
  const geo = new THREE.BufferGeometry().setFromPoints(ringPoints);
  const mat = new THREE.LineBasicMaterial({ color: 0xef4444, transparent: true, opacity: 0.6 });
  rangeRingMesh = new THREE.Line(geo, mat);
  globe.add(rangeRingMesh);
}

function clearRangeRing() {
  if (rangeRingMesh) {
    globe.remove(rangeRingMesh);
    rangeRingMesh.geometry.dispose();
    rangeRingMesh.material.dispose();
    rangeRingMesh = null;
  }
}

// ── UI ──
function buildCountryList() {
  const list = document.getElementById('country-list');
  const sorted = Object.entries(COUNTRY_WARHEADS).sort((a, b) => b[1] - a[1]);
  
  sorted.forEach(([country, count]) => {
    const item = document.createElement('div');
    item.className = 'country-item';
    item.innerHTML = `
      <div class="country-left">
        <div class="country-dot" style="background:${COUNTRY_COLORS[country]}"></div>
        <div class="country-name">${country}</div>
      </div>
      <div class="country-count">${count.toLocaleString()}</div>
    `;
    item.addEventListener('click', () => {
      if (activeCountry === country) {
        activeCountry = null;
        item.classList.remove('active');
      } else {
        document.querySelectorAll('.country-item').forEach(el => el.classList.remove('active'));
        activeCountry = country;
        item.classList.add('active');
      }
      updatePointVisibility();
    });
    list.appendChild(item);
  });
}

function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      updatePointVisibility();
    });
  });
}

function updatePointVisibility() {
  points.forEach((p) => {
    const vis = isVisible(p.facility);
    p.ring.visible = vis;
    p.dot.visible = vis;
    p.pulse.visible = vis;
  });
}

// ── ANIMATE ──
function animate() {
  requestAnimationFrame(animate);
  
  if (autoRotate) {
    targetRotation.y += 0.0012;
  }
  
  // Damping
  rotationVelocity.x *= 0.92;
  rotationVelocity.y *= 0.92;
  
  globe.rotation.x += (targetRotation.x - globe.rotation.x) * 0.05;
  globe.rotation.y += (targetRotation.y - globe.rotation.y) * 0.05;
  
  // Pulse animation
  const time = Date.now() * 0.001;
  points.forEach((p, i) => {
    if (p.pulse.visible) {
      const scale = 1 + Math.sin(time * 2 + i * 0.5) * 0.8;
      p.pulse.scale.set(scale, scale, 1);
      p.pulse.material.opacity = 0.4 * (1 - (scale - 1) / 0.8);
    }
  });
  
  renderer.render(scene, camera);
}

// ── INIT ──
init();
</script>
</body>
</html>
